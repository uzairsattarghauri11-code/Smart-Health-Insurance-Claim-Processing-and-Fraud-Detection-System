{% extends "base.html" %}
{% block title %}Submit Claim{% endblock %}
{% block content %}
<div class="page-title">Submit New Claim</div>
<div class="page-sub">Fill in the claim details. The system will validate the policy and assign a fraud risk score automatically.</div>

<div class="card" style="max-width: 560px;">
  <form method="POST">
    <div class="form-group">
      <label>Policy ID</label>
      <select name="policy_id" required>
        <option value="">-- Select policy --</option>
        {% for pid, p in policies.items() %}
        <option value="{{ pid }}">{{ pid }} — {{ p.holder_name }} (Limit {{ "{:,.0f}".format(p.coverage_limit) }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Patient Name</label>
      <input type="text" name="patient" required>
    </div>
    <div class="form-group">
      <label>Treatment Type</label>
      <select name="treatment" required>
        <option value="surgery">Surgery</option>
        <option value="consultation">Consultation</option>
        <option value="medication">Medication</option>
        <option value="diagnostics">Diagnostics</option>
        <option value="emergency">Emergency</option>
        <option value="cosmetic">Cosmetic (not covered)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Claim Amount</label>
      <input type="number" name="amount" step="0.01" min="0" required>
    </div>
    <div class="form-group">
      <label>Documents Attached?</label>
      <select name="documents">
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>
    </div>
    <button type="submit" class="btn">Submit Claim</button>
    <a href="{{ url_for('dashboard') }}" class="btn btn-sm" style="background:#7f8c9b; margin-left:8px;">Cancel</a>
  </form>
</div>
{% endblock %}
